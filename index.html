<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>من سيربح الملكوت؟</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">
  <div class="slide active" id="intro">
    <h1 class="title">من سيربح الملكوت؟</h1>
    <p class="subtitle">مسابقة كنسية تفاعلية</p>
    <button class="main-btn" onclick="nextSlide()">ابدأ المسابقة</button>
  </div>

  <div class="slide">
    <div class="top-ui">
      <span>السؤال ١</span>
      <div class="timer-circle" id="timer">30</div>
    </div>

    <div class="question-box">
      يصلى الكاهن صلاة ........... بعد ارتداء التونية
    </div>

    <div class="answers">
      <button class="answer-btn" onclick="checkAnswer(this,false)">الشكر</button>
      <button class="answer-btn" onclick="checkAnswer(this,true)">الاستعداد</button>
      <button class="answer-btn" onclick="checkAnswer(this,false)">الأجبية</button>
    </div>
  </div>

  <div class="slide" id="end">
    <h1 class="title">انتهت المسابقة 👑</h1>
    <button class="main-btn" onclick="restartGame()">إعادة اللعب</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
